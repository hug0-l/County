  instructions: "## Goal\nCreate the Python FastAPI backend with SQLite database, ntplib NTP sync, and basic status endpoints. \"開罐即用\" — `python server.py` auto-starts and opens browser.\n\n## Files\n- `server.py` (new, FastAPI single-file server)\n- `requirements.txt` (new)\n\n## Requirements\n\n### 1. server.py Structure\n```python\n# FastAPI app with:\n# - CORS middleware (allow all origins)\n# - Jinja2Templates pointing to templates/\n# - StaticFiles for static/\n# - SQLite database path: vcc_pre.db (auto-created)\n# - On startup: webbrowser.open('http://localhost:8000')\n# - uvicorn.run(app, host='0.0.0.0', port=8000)\n```\n\n### 2. Database Schema (SQLite)\nCreate these tables on first import:\n\n```sql\nCREATE TABLE IF NOT EXISTS schedules (\n    id TEXT PRIMARY KEY,\n    name TEXT NOT NULL,\n    broadcast_date TEXT NOT NULL,\n    start_time TEXT NOT NULL,\n    duration TEXT NOT NULL,\n    periodic_type TEXT DEFAULT 'none',\n    periodic_end_date TEXT DEFAULT '',\n    periodic_days TEXT DEFAULT '[]',\n    preset_id TEXT DEFAULT 'std_news',\n    tags TEXT DEFAULT '[]',\n    color_label TEXT DEFAULT ''\n);\n\nCREATE TABLE IF NOT EXISTS presets (\n    id TEXT PRIMARY KEY,\n    name TEXT NOT NULL,\n    nodes_json TEXT NOT NULL DEFAULT '[]'\n);\n\nCREATE TABLE IF NOT EXISTS config (\n    key TEXT PRIMARY KEY,\n    value TEXT NOT NULL\n);\n\nCREATE TABLE IF NOT EXISTS ntp_logs (\n    id INTEGER PRIMARY KEY AUTOINCREMENT,\n    timestamp TEXT NOT NULL,\n    status TEXT NOT NULL,\n    offset_ms REAL DEFAULT 0,\n    server_url TEXT DEFAULT '',\n    error_msg TEXT DEFAULT ''\n);\n```\n\n### 3. NTPManager Class (in server.py)\n```python\nclass NTPManager:\n    def __init__(self):\n        self.status = 'local'  # 'connected', 'fallback', 'local', 'syncing', 'error'\n        self.offset_ms = 0\n        self.last_sync_time = None\n        self.server_url = 'time.hko.hk'\n        self.error_msg = ''\n    \n    def sync(self) -> dict:\n        \"\"\"Sync with NTP server. Returns status dict.\"\"\"\n        self.status = 'syncing'\n        try:\n            import ntplib\n            client = ntplib.NTPClient()\n            response = client.request(self.server_url, version=3, timeout=5)\n            self.offset_ms = response.offset * 1000  # seconds → ms\n            self.last_sync_time = datetime.utcnow().isoformat()\n            self.status = 'connected'\n            self.error_msg = ''\n            # Log to DB\n            self._log_sync()\n        except Exception as e:\n            self.error_msg = str(e)\n            if self.offset_ms != 0:\n                self.status = 'fallback'\n            else:\n                self.status = 'error'\n        return self.get_status()\n    \n    def get_status(self) -> dict:\n        return {\n            'status': self.status,\n            'offset_ms': round(self.offset_ms, 2),\n            'server': self.server_url,\n            'last_sync': self.last_sync_time or '',\n            'error_msg': self.error_msg\n        }\n    \n    def _log_sync(self):\n        # INSERT into ntp_logs table\n        pass\n```\n\n### 4. NTP Endpoints\n- `GET /api/ntp/status` → `NTPManager.get_status()`\n- `POST /api/ntp/sync` → `NTPManager.sync()`\n\n### 5. Serving Frontend\n- `GET /` → serve `templates/index.html` (for now, create a minimal placeholder index.html that just loads the existing SPA)\n- Actually: For BE-1, just create a minimal `templates/index.html` with a simple redirect or the existing HTML content. We'll integrate properly in FE cards.\n\n**Minimal template/index.html for BE-1:**\nJust copy the existing `VPre_CountdownCtrl_PROD_v0.5.html` into `templates/index.html` as-is (no modifications yet). The FE cards will modify it.\n\n### 6. requirements.txt\n```\nfastapi>=0.110.0\nuvicorn[standard]>=0.29.0\nntplib>=0.4.0\njinja2>=3.1.0\npython-multipart>=0.0.9\n```\n\n### 7. Auto-open browser\nIn `if __name__ == '__main__':` section:\n- Use `threading.Timer(1.5, lambda: webbrowser.open('http://localhost:8000')).start()`\n- Then `uvicorn.run(app, host='0.0.0.0', port=8000)`\n\n## Acceptance Criteria\n- [ ] `python server.py` starts successfully, prints \"Server running at http://localhost:8000\"\n- [ ] Browser auto-opens to http://localhost:8000\n- [ ] `curl http://localhost:8000/api/ntp/status` returns valid JSON with status+offset\n- [ ] `curl -X POST http://localhost:8000/api/ntp/sync` triggers sync, returns updated status\n- [ ] SQLite database `vcc_pre.db` created with all 4 tables\n- [ ] NTP sync with time.hko.hk returns `status: 'connected'` (requires internet)\n- [ ] Without internet, NTPManager returns status 'error' gracefully, no crash\n"
