    5. **`savePresetAction()`** — now also calls `API.savePreset()` (fire-and-forget)
    6. **`saveConfig()`** — now also calls `API.saveConfig()` (fire-and-forget)
    7. **`applyConfigJson()`** — now also calls `API.saveConfig()` (fire-and-forget)
    8. **`deleteProgram()`** — now also calls `API.deleteSchedule()` before local delete
    9. **`clearAllPrograms()`** — now also calls `API.deleteSchedule()` for each program
    10. **`saveDataToFile()`** — tries `API.downloadBackup()` first, falls back to localStorage export
    11. **`handleFileOpen()`** — tries `API.restoreBackup()` first, falls back to localStorage import

    ### Key principles followed:
    - All API calls are non-blocking (`.then()`, no `await`)
