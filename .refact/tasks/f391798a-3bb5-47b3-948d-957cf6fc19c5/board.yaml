  instructions: "## Goal\nUpdate all documentation to reflect the Python backend architecture. Polish the project for \"開罐即用\" experience.\n\n## Files\n- `README.md` (rewrite with new setup guide)\n- `AGENTS.md` (update architecture section)\n- `CHANGELOG.md` (add v0.6 entry)\n- `server.py` (verify auto-open browser works)\n- `requirements.txt` (verify deps)\n\n## Requirements\n\n### 1. README.md — Full Rewrite\nReplace the entire README with a new version that covers:\n\n**Quick Start** (top of file — most important):\n```markdown\n# ⚡ 快速開始\n\n## 需求\n- Python 3.10+\n- 網路連線（NTP 校時用，可不連線但會降級至本地時鐘）\n\n## 安裝與啟動\n```bash\n# 1. 安裝依賴\npip install -r requirements.txt\n\n# 2. 啟動伺服器（自動開啟瀏覽器）\npython server.py\n```\n\n瀏覽器自動開啟 `http://localhost:8000`，您的主控台就在這裡！\n\n## 🆕 v0.6 新功能\n- **真實 NTP 校時** — 使用 ntplib 連接香港天文台 time.hko.hk，精度 ±5ms\n- **Python 後端** — FastAPI + SQLite，資料不再受瀏覽器限制\n- **自動備份** — 每次啟動自動備份資料庫\n- **開罐即用** — 一條指令啟動完整系統\n```\n\nThen keep the rest of the architecture documentation but update:\n- Section 9 (Storage) → add SQLite section\n- Section 11 (NTP) → update to reflect Python ntplib backend\n\n### 2. AGENTS.md — Update Architecture\nUpdate the NTP time service section to reference Python backend:\n- NTPManager still in frontend but now calls `/api/ntp/sync`\n- Backend uses ntplib to connect `time.hko.hk`\n- Database is SQLite (`vcc_pre.db`)\n\n### 3. CHANGELOG.md — Add v0.6\nAdd v0.6 entry at the top:\n```markdown\n## v0.6 (2026-06-20)\n- **重大架構升級** — 從純前端 SPA 升級為 Python後端架構 (FastAPI + SQLite + ntplib)\n- **真實 NTP 校時** — 伺服器端 ntplib 連接香港天文台 time.hko.hk，精度 ±5ms\n- **資料持久化** — SQLite 資料庫取代 localStorage，跨 session 不遺失\n- **多機共享** — 區域網內多個操作員可同時操作同一個排程資料庫\n- **自動備份** — 每次啟動自動產生日期備份檔\n- **開罐即用** — `pip install -r requirements.txt && python server.py` 一條指令啟動\n- **設定頁 NTP 面板** — 可設定 NTP 伺服器、同步間隔、立即同步\n- **離線降級** — 後端離線時自動降級至 localStorage + 本地時鐘\n```\n\n### 4. Verify Auto-open Browser\nIn `server.py`, ensure the auto-open works reliably:\n```python\nif __name__ == '__main__':\n    import threading\n    import webbrowser\n    \n    def open_browser():\n        import time\n        time.sleep(1.5)\n        webbrowser.open('http://localhost:8000')\n    \n    threading.Thread(target=open_browser, daemon=True).start()\n    print(f\"🚀 VCC PRE Server starting...\")\n    print(f\"📡 Open http://localhost:8000 in your browser\")\n    uvicorn.run(app, host='0.0.0.0', port=8000)\n```\n\n### 5. Final Integration Test\nAfter all cards merged, verify the complete workflow:\n1. Fresh install: `pip install -r requirements.txt`\n2. Start server: `python server.py`\n3. Browser opens, page loads\n4. NTP syncs automatically, status shows connected\n5. Create a schedule, refresh page → data persists\n6. Edit a preset, refresh → data persists\n7. Download backup → valid JSON\n8. Restore from backup → data restored\n9. Kill server, refresh browser → localStorage fallback works, app still works offline\n\n## Acceptance Criteria\n- [ ] README updated with clear one-line setup guide\n- [ ] AGENTS.md updated with new architecture\n- [ ] CHANGELOG.md has v0.6 entry\n- [ ] `python server.py` opens browser automatically\n- [ ] End-to-end test: install → run → use → persist → backup → restore → works\n"
