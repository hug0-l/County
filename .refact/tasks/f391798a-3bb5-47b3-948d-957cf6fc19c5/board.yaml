- id: BE-3
  title: Config & Backup API
  column: done
  priority: P1
  depends_on:
  - BE-2
  instructions: "## Goal\nAdd config persistence and backup/restore endpoints to server.py. Implement auto-backup.\n\n## Files\n- `server.py` (modify)\n\n## Requirements\n\n### 1. Config Endpoints\n```\nGET  /api/config  → return config object\nPUT  /api/config  → update config (partial merge)\n```\n\n**Config storage**: Use the `config` table (key-value):\n```python\n# Keys stored:\n# - 'frameRate': '25'\n# - 'timezone': 'Asia/Hong_Kong'\n# - 'beepFreq': '1500'\n# - 'beepDur': '0.5'\n# - 'retentionSeconds': '5'\n# - 'ntpServerUrl': 'time.hko.hk'\n# - 'ntpAutoSyncInterval': '600'\n# - 'timeOffset': '0'\n# - 'lastSelectedDate': '2026-06-20'\n\ndef db_get_all_config() -> dict:\n    conn = sqlite3.connect(DB_PATH)\n    rows = conn.execute('SELECT key, value FROM config').fetchall()\n    config = {row['key']: row['value'] for row in rows}\n    conn.close()\n    return config\n\ndef db_set_config(key: str, value: str):\n    conn = sqlite3.connect(DB_PATH)\n    conn.execute('INSERT OR REPLACE INTO config (key, value) VALUES (?,?)', (key, str(value)))\n    conn.commit()\n    conn.close()\n\ndef db_set_config_many(pairs: dict):\n    conn = sqlite3.connect(DB_PATH)\n    for key, value in pairs.items():\n        conn.execute('INSERT OR REPLACE INTO config (key, value) VALUES (?,?)', (key, str(value)))\n    conn.commit()\n    conn.close()\n\ndef db_clear_config():\n    conn = sqlite3.connect(DB_PATH)\n    conn.execute('DELETE FROM config')\n    conn.commit()\n    conn.close()\n```\n\n**Endpoint implementations**:\n```python\n@app.get('/api/config')\ndef get_config():\n    \"\"\"Return all config as a flat JSON object.\"\"\"\n    config = db_get_all_config()\n    # Add defaults if missing\n    defaults = {\n        'frameRate': '25',\n        'timezone': 'Asia/Hong_Kong',\n        'beepFreq': '1500',\n        'beepDur': '0.5',\n        'retentionSeconds': '5',\n        'ntpServerUrl': 'time.hko.hk',\n        'ntpAutoSyncInterval': '600',\n        'ntpLastOffset': '0',\n        'ntpLastSyncTime': '',\n        'lastSelectedDate': '',\n    }\n    for k, v in defaults.items():\n        if k not in config:\n            config[k] = v\n    return config\n\n@app.put('/api/config')\ndef update_config(data: dict):\n    \"\"\"Update config (partial merge). Accepts flat JSON object.\"\"\"\n    db_set_config_many(data)\n    return db_get_all_config()\n```\n\n### 2. Backup Endpoints\n```\nGET  /api/backup/download  → download full DB JSON dump\nPOST /api/backup/restore   → upload JSON to restore full DB (multipart file)\n```\n\n**Download**:\n```python\n@app.get('/api/backup/download')\ndef download_backup():\n    schedules = db_get_schedules()\n    presets = db_get_presets()\n    config = db_get_all_config()\n    ntp_logs = db_get_ntp_logs()\n    backup = {\n        'version': '0.6',\n        'exported_at': datetime.utcnow().isoformat(),\n        'schedules': schedules,\n        'presets': presets,\n        'config': config,\n        'ntp_logs': ntp_logs\n    }\n    return JSONResponse(\n        content=backup,\n        headers={'Content-Disposition': 'attachment; filename=\"vcc_pre_backup.json\"'}\n    )\n```\n\n**Restore**:\n```python\n@app.post('/api/backup/restore')\nasync def restore_backup(file: UploadFile):\n    content = await file.read()\n    data = json.loads(content)\n    # Replace all data\n    # Clear existing\n    conn = sqlite3.connect(DB_PATH)\n    conn.execute('DELETE FROM schedules')\n    conn.execute('DELETE FROM presets')\n    conn.execute('DELETE FROM config')\n    conn.commit()\n    conn.close()\n    # Import\n    db_import_legacy(data.get('schedules', []), \n                     {p['id']: p for p in data.get('presets', [])})\n    if 'config' in data:\n        db_set_config_many(data['config'])\n    return {'status': 'ok', 'schedules': len(data.get('schedules',[])), 'presets': len(data.get('presets',[]))}\n```\n\n### 3. Auto-backup on Server Start\nAdd to the startup sequence (after DB init):\n```python\nimport os\nfrom datetime import date\n\nBACKUP_DIR = 'backups'\nos.makedirs(BACKUP_DIR, exist_ok=True)\n\ntoday = date.today().isoformat()\nbackup_path = os.path.join(BACKUP_DIR, f'vcc_pre_{today}.json')\nif not os.path.exists(backup_path):\n    try:\n        data = {\n            'version': '0.6',\n            'exported_at': datetime.utcnow().isoformat(),\n            'schedules': db_get_schedules(),\n            'presets': [{**p, 'nodes_json': json.dumps(p.get('nodes',[]))} for p in db_get_presets()],\n            'config': db_get_all_config()\n        }\n        with open(backup_path, 'w', encoding='utf-8') as f:\n            json.dump(data, f, ensure_ascii=False, indent=2)\n        print(f\"📦 Auto-backup saved: {backup_path}\")\n    except Exception as e:\n        print(f\"⚠️ Auto-backup failed: {e}\")\n```\n\n### 4. ntp_logs helper\n```python\ndef db_get_ntp_logs(limit=50):\n    conn = sqlite3.connect(DB_PATH)\n    conn.row_factory = sqlite3.Row\n    rows = conn.execute('SELECT * FROM ntp_logs ORDER BY id DESC LIMIT ?', (limit,)).fetchall()\n    conn.close()\n    return [dict(r) for r in rows]\n```\n\n## Acceptance Criteria\n- [ ] `curl http://localhost:8000/api/config` returns all config fields with defaults\n- [ ] `curl -X PUT http://localhost:8000/api/config -H 'Content-Type: application/json' -d '{\"beepFreq\":\"2000\"}'` updates config\n- [ ] `curl http://localhost:8000/api/config` now shows `beepFreq: \"2000\"`\n- [ ] `curl http://localhost:8000/api/backup/download` returns JSON with schedules, presets, config\n- [ ] Backup file can be re-uploaded via POST to `/api/backup/restore`\n- [ ] Auto-backup file created in `backups/` directory on server start\n- [ ] Restarting server: config values persist in SQLite\n"
