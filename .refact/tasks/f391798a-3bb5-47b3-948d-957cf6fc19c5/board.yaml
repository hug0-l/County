- id: FE-2
  title: Frontend NTP + Settings Panel + Startup
  column: done
  priority: P1
  depends_on:
  - FE-1
  instructions: "## Goal\nWire frontend NTP sync to the backend API, add NTP settings panel to the Settings page, and ensure the startup flow uses the server's time offset.\n\n## Files\n- `templates/index.html` (modify)\n\n## Requirements\n\n### 1. Update NTPManager.sync() to use Backend API\nModify the `NTPManager` object (added in T-1, inside the SPA) to call the backend:\n\n```javascript\n// In NTPManager.sync() method — replace direct fetch with:\nasync sync(url) {\n    this.status = 'syncing';\n    updateNtpStatusUI();\n    try {\n        const result = await API.ntpSync();\n        if (result && result.status === 'connected') {\n            this.status = 'connected';\n            this.offset = result.offset_ms;\n            this.lastSyncTime = result.last_sync;\n            this.errorMsg = '';\n            timeOffset = this.offset;\n            // Persist locally too\n            localStorage.setItem('vcc_pre_ntp_offset', String(this.offset));\n            localStorage.setItem('vcc_pre_ntp_last_sync', this.lastSyncTime);\n        } else if (result) {\n            this.status = result.status;  // 'error' or 'fallback'\n            this.errorMsg = result.error_msg || 'NTP 同步失敗';\n            // Keep existing offset (don't overwrite)\n        } else {\n            // API call failed — server might be down\n            this.status = this.offset !== 0 ? 'fallback' : 'local';\n            this.errorMsg = '無法連線至伺服器 NTP 服務';\n        }\n    } catch(err) {\n        this.status = this.offset !== 0 ? 'fallback' : 'local';\n        this.errorMsg = err.message || 'NTP 同步例外錯誤';\n    }\n    updateNtpStatusUI();\n}\n```\n\nSimilarly update `checkNtpStatus()` to use `API.ntpStatus()`.\n\n### 2. Add NTP Settings Panel to Settings Page\nIn the Settings page HTML (around line 690, before 「音訊設定」 panel), add:\n\n```html\n<div class=\"panel-box\">\n    <div class=\"panel-header-box\"><div class=\"panel-title\">🕒 NTP 時間服務</div></div>\n    <div class=\"input-form\" style=\"grid-template-columns: 1fr;\">\n        <div class=\"input-group\">\n            <label>NTP 伺服器</label>\n            <input type=\"text\" id=\"cfgNtpUrl\" value=\"time.hko.hk\" onchange=\"saveConfig()\" style=\"width:100%;\">\n            <div style=\"font-size:11px; color:#64748b; margin-top:4px;\">使用真實 NTP (UDP 123) 協定，由伺服器端 ntplib 處理</div>\n        </div>\n        <div class=\"input-group\">\n            <label>自動同步間隔（秒）</label>\n            <div style=\"display:flex; align-items:center; gap:8px;\">\n                <input type=\"number\" id=\"cfgNtpInterval\" value=\"600\" min=\"0\" max=\"86400\" style=\"width:100px;\" onchange=\"saveConfig(); restartAutoSync();\">\n                <span style=\"font-size:11px; color:#64748b;\">0 = 關閉</span>\n            </div>\n        </div>\n        <div class=\"input-group\">\n            <label>狀態</label>\n            <div id=\"settingsNtpStatus\" style=\"font-size:13px; color:#9ca3af;\">尚未同步</div>\n        </div>\n        <div class=\"input-group\">\n            <label>最後同步時間</label>\n            <div id=\"settingsNtpLastSync\" style=\"font-size:12px; color:#64748b; font-family:monospace;\">—</div>\n        </div>\n        <div class=\"input-group\" style=\"margin-top:4px;\">\n            <button class=\"btn-start\" id=\"btnNtpSync\" onclick=\"handleManualNtpSync()\" style=\"font-size:12px; padding:8px 16px;\">🔄 立即同步</button>\n        </div>\n    </div>\n</div>\n```\n\n**Important**: Do NOT remove the 音訊設定 panel — add NTP panel before it.\n\n### 3. `handleManualNtpSync()` function\n```javascript\nfunction handleManualNtpSync() {\n    const btn = document.getElementById('btnNtpSync');\n    btn.disabled = true;\n    btn.innerText = '⏳ 同步中…';\n    NTPManager.sync().finally(function() {\n        btn.disabled = false;\n        btn.innerText = '🔄 立即同步';\n        updateSettingsNtpUI();\n    });\n}\n```\n\n### 4. `updateSettingsNtpUI()` function\n```javascript\nfunction updateSettingsNtpUI() {\n    const statusEl = document.getElementById('settingsNtpStatus');\n    const lastSyncEl = document.getElementById('settingsNtpLastSync');\n    if (!statusEl) return;\n    \n    const s = NTPManager.status;\n    if (s === 'connected') {\n        statusEl.innerHTML = '🟢 <span style=\"color:#34d399;\">已同步 — 伺服器真實 NTP</span>';\n    } else if (s === 'syncing') {\n        statusEl.innerHTML = '🔄 <span style=\"color:#60a5fa;\">同步中…</span>';\n    } else if (s === 'fallback') {\n        statusEl.innerHTML = '🟡 <span style=\"color:#fbbf24;\">已降級 (保留前次偏移)</span>';\n    } else if (s === 'error') {\n        statusEl.innerHTML = '🔴 <span style=\"color:#f87171;\">錯誤</span>';\n    } else {\n        statusEl.innerHTML = '⚪ <span style=\"color:#9ca3af;\">未同步 (本地時鐘)</span>';\n    }\n    if (NTPManager.errorMsg) {\n        statusEl.innerHTML += '<br><span style=\"font-size:11px; color:#ef4444;\">' + NTPManager.errorMsg + '</span>';\n    }\n    if (lastSyncEl) {\n        lastSyncEl.innerText = NTPManager.lastSyncTime ? new Date(NTPManager.lastSyncTime).toLocaleString() : '—';\n    }\n}\n```\n\n### 5. `restartAutoSync()` function\n```javascript\nfunction restartAutoSync() {\n    if (NTPManager.timerId) {\n        clearInterval(NTPManager.timerId);\n        NTPManager.timerId = null;\n    }\n    const interval = parseInt(document.getElementById('cfgNtpInterval').value) || 0;\n    NTPManager.config.ntpAutoSyncInterval = interval;\n    if (interval > 0) {\n        NTPManager.timerId = setInterval(function() {\n            NTPManager.sync();\n        }, interval * 1000);\n    }\n}\n```\n\n### 6. Update `loadConfig()` to restore NTP UI from API/localStorage\nAfter loading config, also:\n```javascript\n// Restore NTP config\nconst ntpUrl = document.getElementById('cfgNtpUrl');\nconst ntpInterval = document.getElementById('cfgNtpInterval');\nif (ntpUrl && appConfig.ntpServerUrl) ntpUrl.value = appConfig.ntpServerUrl;\nif (ntpInterval && appConfig.ntpAutoSyncInterval) ntpInterval.value = appConfig.ntpAutoSyncInterval;\n```\n\n### 7. Update `syncWithNetworkTime(callback)` initializer\nOn page load:\n- First try `API.ntpStatus()` to get current server state\n- If server is up: use server offset via NTPManager\n- If server is down: fallback to stored localStorage offset\n- Call `restartAutoSync()` after sync\n\n### 8. Integrate with existing status bar\nUpdate `updateNtpStatusUI()` (from T-1) to also call `updateSettingsNtpUI()` so both UIs stay in sync.\n\n## Acceptance Criteria\n- [ ] Settings page shows NTP panel with URL, interval inputs\n- [ ] \"立即同步\" button triggers server-side NTP sync, shows status\n- [ ] Status bar shows connected status with offset from server NTP\n- [ ] When server is offline, status shows fallback/local mode\n- [ ] Auto-sync timer runs at configured interval\n- [ ] Changing interval → timer restarts\n- [ ] Server NTP from time.hko.hk shows status 'connected' (if network available)\n- [ ] All localStorage fallback mechanisms still work\n"
