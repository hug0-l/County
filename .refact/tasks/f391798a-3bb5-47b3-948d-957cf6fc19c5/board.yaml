  title: NTP Core Service + Config Schema
  column: done
  priority: P0
  depends_on: []
  instructions: "## Goal\nCreate the NTP sync engine (`NTPManager` object), update `getCalibratedDate()` to apply real time offsets, extend config schema, and build the status badge system.\n\n## Files\n- `VPre_CountdownCtrl_PROD_v0.5.html` (single file, all changes in one place)\n\n## Spec\n\n### NTPManager Object (add near global variables section, e.g. after line ~1115)\n```javascript\n// NTP 時間服務管理器\nconst NTPManager = {\n    status: 'local',        // 'connected' | 'fallback' | 'local' | 'syncing' | 'error'\n    offset: 0,              // milliseconds (serverTime - localTime)\n    lastSyncTime: null,     // ISO string or null\n    errorMsg: '',\n    config: {\n        ntpServerUrl: 'https://worldtimeapi.org/api/timezone/Asia/Hong_Kong',\n        ntpAutoSyncInterval: 0,   // seconds, 0=disabled\n    },\n    timerId: null,          // auto-sync interval ID\n\n    // Core sync: fetch URL, parse time, compute offset\n    async sync(url) {\n        this.status = 'syncing';\n        updateNtpStatusUI();\n        url = url || this.config.ntpServerUrl;\n        const controller = new AbortController();\n        const timeoutId = setTimeout(() => controller.abort(), 5000);\n        try {\n            const res = await fetch(url, { signal: controller.signal });\n            const data = await res.json();\n            let serverEpoch = 0;\n            if (data.datetime) {\n                serverEpoch = new Date(data.datetime).getTime();\n            } else if (data.utc_datetime) {\n                serverEpoch = new Date(data.utc_datetime).getTime();\n            } else if (data.unixtime) {\n                serverEpoch = parseInt(data.unixtime) * 1000;\n            }\n            if (!serverEpoch) throw new Error('無法解析伺服器時間');\n            this.offset = serverEpoch - Date.now();\n            this.lastSyncTime = new Date().toISOString();\n            timeOffset = this.offset;\n            this.status = 'connected';\n            this.errorMsg = '';\n            // Persist\n            localStorage.setItem('vcc_pre_ntp_offset', String(this.offset));\n            localStorage.setItem('vcc_pre_ntp_last_sync', this.lastSyncTime);\n            appConfig.ntpLastOffset = this.offset;\n            appConfig.ntpLastSyncTime = this.lastSyncTime;\n            saveConfig();\n        } catch(err) {\n            if (err.name === 'AbortError') {\n                this.errorMsg = '連線超時 (5s)';\n            } else {\n                this.errorMsg = err.message || '同步失敗';\n            }\n            // 保留上一次成功的 offset，不改動 timeOffset\n            this.status = this.offset !== 0 ? 'fallback' : 'local';\n        } finally {\n            clearTimeout(timeoutId);\n            updateNtpStatusUI();\n        }\n    }\n};\n```\n\n### Update `getCalibratedDate()` (around line 2096)\nChange the `getCalibratedDate()` function — specifically, **make the catch branch use `Date.now() + timeOffset`** where `timeOffset` is now the real NTP offset (set by NTPManager.sync). Currently `timeOffset` is declared as `0` on line 1115 and set to `1` in the dummy function.\n\nChanges needed:\n- Declare `let timeOffset = 0;` (already exists line ~1115, keep as-is)\n- In `getCalibratedDate()`, the try block stays the same (timezone conversion). The catch block should use `Date.now() + timeOffset` (it already does on line 2107, so this is correct)\n- Remove the dummy `syncWithNetworkTime` function body\n\n### Config Schema Extension\nAdd these to `appConfig` initialization (around line ~1070, the `loadConfig()` or default `appConfig`):\n```javascript\n// In the default appConfig or loadConfig merge:\nntpServerUrl: localStorage.getItem('vcc_pre_ntp_server_url') || 'https://worldtimeapi.org/api/timezone/Asia/Hong_Kong',\nntpAutoSyncInterval: parseInt(localStorage.getItem('vcc_pre_ntp_interval') || '0'),\nntpLastOffset: parseInt(localStorage.getItem('vcc_pre_ntp_offset') || '0'),\nntpLastSyncTime: localStorage.getItem('vcc_pre_ntp_last_sync') || '',\n```\n\n### `updateNtpStatusUI()` Function\nAdd this new function:\n```javascript\nfunction updateNtpStatusUI() {\n    const badge = document.getElementById('syncBadge');\n    const ntpStatusEl = document.getElementById('ntpStatus');\n    if (!badge) return;\n    \n    const status = NTPManager.status;\n    const offset = NTPManager.offset;\n    const lastSync = NTPManager.lastSyncTime;\n    const errorMsg = NTPManager.errorMsg;\n    \n    if (status === 'syncing') {\n        badge.className = 'sync-badge sync-loading';\n        badge.innerText = '🔄 NTP 同步中…';\n        if (ntpStatusEl) ntpStatusEl.innerText = '';\n    } else if (status === 'connected') {\n        badge.className = 'sync-badge sync-success';\n        const offsetMs = Math.round(offset);\n        const sign = offsetMs >= 0 ? '+' : '';\n        badge.innerText = `🕒 NTP 已同步 (${sign}${offsetMs}ms)`;\n        if (ntpStatusEl) {\n            const url = NTPManager.config.ntpServerUrl;\n            const timeStr = lastSync ? new Date(lastSync).toLocaleTimeString() : '';\n            ntpStatusEl.innerText = `來源: ${url} | 最後同步: ${timeStr}`;\n        }\n    } else if (status === 'fallback') {\n        badge.className = 'sync-badge sync-success';\n        const offsetMs = Math.round(offset);\n        badge.innerText = `🖥️ 本地時鐘 (保留偏移 ${offsetMs >= 0 ? '+' : ''}${offsetMs}ms)`;\n        if (ntpStatusEl) {\n            ntpStatusEl.innerText = `⚠️ NTP 同步失敗 — ${errorMsg}`;\n        }\n    } else if (status === 'error') {\n        badge.className = 'sync-badge sync-success';\n        badge.innerText = '🖥️ 本地時鐘';\n        if (ntpStatusEl) ntpStatusEl.innerText = `⚠️ NTP 錯誤 — ${errorMsg}`;\n    } else { // local\n        badge.className = 'sync-badge sync-success';\n        badge.innerText = '🖥️ 本地時鐘';\n        if (ntpStatusEl) ntpStatusEl.innerText = '';\n    }\n}\n```\n\n### Replace Dummy Functions\nReplace the entire `syncWithNetworkTime` function (lines 2244-2252):\n```javascript\nfunction syncWithNetworkTime(callback) {\n    const storedOffset = parseInt(localStorage.getItem('vcc_pre_ntp_offset') || '0');\n    const storedSyncTime = localStorage.getItem('vcc_pre_ntp_last_sync') || '';\n    if (storedOffset) {\n        timeOffset = storedOffset;\n        NTPManager.offset = storedOffset;\n        NTPManager.lastSyncTime = storedSyncTime;\n        NTPManager.status = storedOffset !== 0 ? 'fallback' : 'local';\n    }\n    // 嘗試同步\n    NTPManager.sync(NTPManager.config.ntpServerUrl).finally(function() {\n        if (callback) callback();\n    });\n}\n```\n\nReplace the `checkNtpStatus` function (lines 2254-2268) with a call to `updateNtpStatusUI()` — actually keep the function but simplify it:\n```javascript\nfunction checkNtpStatus() {\n    updateNtpStatusUI();\n    // One-shot sync attempt (non-blocking, just for status)\n    NTPManager.sync();\n}\n```\n\n### Config save/load integration\nFind `saveConfig()` and `loadConfig()` (around line ~1070 area, search for these functions) and ensure they handle the new NTP fields.\n\n**Important**: Search for the config functions — the file has `loadConfig`, `saveConfig`, and the initial default `appConfig`. Extend them to include the ntp fields.\n\n## Acceptance Criteria\n- [ ] After page load with network, clock shows synced time with offset ±Xms badge\n- [ ] Without network, last known offset is preserved, badge shows \"本地時鐘\"\n- [ ] `getCalibratedDate()` uses `Date.now() + timeOffset` properly\n- [ ] `ntpServerUrl`, `ntpLastOffset`, `ntpLastSyncTime` persist in localStorage\n- [ ] Status bar shows syncing state, connected state, and fallback states correctly\n- [ ] No leftover dead code from old `syncWithNetworkTime` or `checkNtpStatus`\n"
