- id: BE-2
  title: Schedule & Preset CRUD API
  column: done
  priority: P0
  depends_on:
  - BE-1
  instructions: "## Goal\nAdd REST CRUD endpoints for schedules and presets to the server.py, with full database persistence.\n\n## Files\n- `server.py` (modify — add endpoints, DB helpers)\n\n## Requirements\n\n### 1. Database Helper Functions\nAdd to server.py:\n```python\nimport json\n\ndef db_get_schedules() -> list:\n    \"\"\"Return all schedules as list of dicts.\"\"\"\n    conn = sqlite3.connect(DB_PATH)\n    conn.row_factory = sqlite3.Row\n    rows = conn.execute('SELECT * FROM schedules ORDER BY broadcast_date, start_time').fetchall()\n    result = []\n    for row in rows:\n        d = dict(row)\n        d['tags'] = json.loads(d.get('tags', '[]'))\n        d['periodicDays'] = json.loads(d.get('periodic_days', '[]'))\n        result.append(d)\n    conn.close()\n    return result\n\ndef db_get_schedule(id: str) -> dict | None:\n    conn = sqlite3.connect(DB_PATH)\n    conn.row_factory = sqlite3.Row\n    row = conn.execute('SELECT * FROM schedules WHERE id=?', (id,)).fetchone()\n    conn.close()\n    if row:\n        d = dict(row)\n        d['tags'] = json.loads(d.get('tags', '[]'))\n        d['periodicDays'] = json.loads(d.get('periodic_days', '[]'))\n        return d\n    return None\n\ndef db_upsert_schedule(data: dict) -> dict:\n    conn = sqlite3.connect(DB_PATH)\n    tags_json = json.dumps(data.get('tags', []), ensure_ascii=False)\n    days_json = json.dumps(data.get('periodicDays', []))\n    conn.execute('''INSERT OR REPLACE INTO schedules \n        (id, name, broadcast_date, start_time, duration, periodic_type, \n         periodic_end_date, periodic_days, preset_id, tags, color_label)\n        VALUES (?,?,?,?,?,?,?,?,?,?,?)''',\n        (data['id'], data['name'], data.get('broadcastDate',''),\n         data.get('startTime',''), data.get('duration',''),\n         data.get('periodicType','none'), data.get('periodicEndDate',''),\n         days_json, data.get('presetId','std_news'),\n         tags_json, data.get('colorLabel','')))\n    conn.commit()\n    conn.close()\n    return db_get_schedule(data['id'])\n\ndef db_delete_schedule(id: str) -> bool:\n    conn = sqlite3.connect(DB_PATH)\n    conn.execute('DELETE FROM schedules WHERE id=?', (id,))\n    affected = conn.total_changes\n    conn.commit()\n    conn.close()\n    return affected > 0\n\ndef db_get_presets() -> list:\n    conn = sqlite3.connect(DB_PATH)\n    conn.row_factory = sqlite3.Row\n    rows = conn.execute('SELECT * FROM presets').fetchall()\n    result = [dict(r) for r in rows]\n    for r in result:\n        r['nodes'] = json.loads(r.pop('nodes_json', '[]'))\n    conn.close()\n    return result\n\ndef db_get_preset(id: str) -> dict | None:\n    conn = sqlite3.connect(DB_PATH)\n    conn.row_factory = sqlite3.Row\n    row = conn.execute('SELECT * FROM presets WHERE id=?', (id,)).fetchone()\n    conn.close()\n    if row:\n        d = dict(row)\n        d['nodes'] = json.loads(d.pop('nodes_json', '[]'))\n        return d\n    return None\n\ndef db_upsert_preset(data: dict) -> dict:\n    conn = sqlite3.connect(DB_PATH)\n    nodes_json = json.dumps(data.get('nodes', []), ensure_ascii=False)\n    conn.execute('''INSERT OR REPLACE INTO presets (id, name, nodes_json)\n        VALUES (?,?,?)''', (data['id'], data['name'], nodes_json))\n    conn.commit()\n    conn.close()\n    return db_get_preset(data['id'])\n\ndef db_delete_preset(id: str) -> bool:\n    conn = sqlite3.connect(DB_PATH)\n    conn.execute('DELETE FROM presets WHERE id=?', (id,))\n    affected = conn.total_changes\n    conn.commit()\n    conn.close()\n    return affected > 0\n\ndef db_import_legacy(schedules: list, presets: dict):\n    \"\"\"Import from legacy localStorage dump.\"\"\"\n    # Presets\n    for pid, pdata in presets.items():\n        db_upsert_preset({'id': pid, 'name': pdata.get('name',''), 'nodes': pdata.get('nodes',[])})\n    # Schedules\n    for s in schedules:\n        db_upsert_schedule(s)\n```\n\n### 2. Schedule Endpoints\n```\nGET    /api/schedule              → list all schedules\nGET    /api/schedule/{id}        → single schedule\nPOST   /api/schedule              → create (generate id if missing)\nPUT    /api/schedule/{id}        → update\nDELETE /api/schedule/{id}        → delete\n```\n\n### 3. Preset Endpoints\n```\nGET    /api/preset                → list all presets\nGET    /api/preset/{id}          → single preset\nPOST   /api/preset                → create (generate id if missing)\nPUT    /api/preset/{id}          → update\nDELETE /api/preset/{id}          → delete\n```\n\n### 4. Import Legacy Endpoint\n```\nPOST   /api/import-legacy         → body: {\"schedules\": [...], \"presets\": {...}}\n```\n\n### 5. Pydantic Models\nAdd request/response models:\n```python\nfrom pydantic import BaseModel\nfrom typing import Optional\n\nclass ScheduleCreate(BaseModel):\n    id: Optional[str] = None\n    name: str\n    broadcastDate: str\n    startTime: str\n    duration: str\n    periodicType: str = 'none'\n    periodicEndDate: str = ''\n    periodicDays: list = []\n    presetId: str = 'std_news'\n    tags: list = []\n    colorLabel: str = ''\n\nclass PresetCreate(BaseModel):\n    id: Optional[str] = None\n    name: str\n    nodes: list = []\n```\n\n### 6. Generate ID helper\n```python\nimport time\ndef generate_id(prefix='P_'):\n    return f\"{prefix}{int(time.time()*1000)}\"\n```\n\n## Acceptance Criteria\n- [ ] `curl http://localhost:8000/api/schedule` returns `[]` initially\n- [ ] `curl -X POST http://localhost:8000/api/schedule -H 'Content-Type: application/json' -d '{\"name\":\"Test\",\"broadcastDate\":\"2026-06-20\",\"startTime\":\"18:30:00:00\",\"duration\":\"00:30:00:00\"}'` creates and returns a schedule\n- [ ] `curl http://localhost:8000/api/schedule/{id}` returns that schedule\n- [ ] `curl -X PUT http://localhost:8000/api/schedule/{id} -H 'Content-Type: application/json' -d '{\"name\":\"Updated\"}'` updates\n- [ ] `curl -X DELETE http://localhost:8000/api/schedule/{id}` deletes\n- [ ] Same tests for presets\n- [ ] `curl -X POST http://localhost:8000/api/import-legacy -H 'Content-Type: application/json' -d '{\"schedules\":[],\"presets\":{}}'` succeeds\n"
