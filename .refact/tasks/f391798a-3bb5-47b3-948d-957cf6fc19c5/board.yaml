  instructions: "## Goal\nModify the frontend SPA to call backend REST API instead of localStorage for all CRUD operations. Add graceful fallback to localStorage when server is unreachable.\n\n## Files\n- copy `VPre_CountdownCtrl_PROD_v0.5.html` → `templates/index.html` (modify in place)\n\n## Strategy\nCreate an `APIClient` wrapper that tries the backend API first, falls back to localStorage:\n\n```javascript\n// ===== API Client — Backend-first, localStorage fallback =====\nconst API = {\n    baseUrl: '',  // same origin\n    \n    async _fetch(path, options = {}) {\n        try {\n            const res = await fetch(this.baseUrl + path, {\n                ...options,\n                headers: { 'Content-Type': 'application/json', ...options.headers },\n                signal: AbortSignal.timeout(3000)  // 3s timeout\n            });\n            if (!res.ok) throw new Error(`HTTP ${res.status}`);\n            return await res.json();\n        } catch(e) {\n            return null;  // server unreachable\n        }\n    },\n    \n    // Schedule\n    async loadSchedules() { return this._fetch('/api/schedule'); },\n    async saveSchedule(data) { return this._fetch('/api/schedule', { method: 'POST', body: JSON.stringify(data) }); },\n    async updateSchedule(id, data) { return this._fetch(`/api/schedule/${id}`, { method: 'PUT', body: JSON.stringify(data) }); },\n    async deleteSchedule(id) { return this._fetch(`/api/schedule/${id}`, { method: 'DELETE' }); },\n    \n    // Presets\n    async loadPresets() { return this._fetch('/api/preset'); },\n    async savePreset(data) { return this._fetch('/api/preset', { method: 'POST', body: JSON.stringify(data) }); },\n    async updatePreset(id, data) { return this._fetch(`/api/preset/${id}`, { method: 'PUT', body: JSON.stringify(data) }); },\n    async deletePreset(id) { return this._fetch(`/api/preset/${id}`, { method: 'DELETE' }); },\n    \n    // Config\n    async loadConfig() { return this._fetch('/api/config'); },\n    async saveConfig(data) { return this._fetch('/api/config', { method: 'PUT', body: JSON.stringify(data) }); },\n    \n    // NTP\n    async ntpStatus() { return this._fetch('/api/ntp/status'); },\n    async ntpSync() { return this._fetch('/api/ntp/sync', { method: 'POST' }); },\n    \n    // Backup\n    async downloadBackup() { \n        try {\n            const res = await fetch('/api/backup/download');\n            if (!res.ok) return null;\n            return await res.blob();\n        } catch(e) { return null; }\n    },\n    async restoreBackup(file) {\n        const formData = new FormData();\n        formData.append('file', file);\n        try {\n            const res = await fetch('/api/backup/restore', { method: 'POST', body: formData });\n            return res.ok ? await res.json() : null;\n        } catch(e) { return null; }\n    },\n    \n    async importLegacy(data) {\n        return this._fetch('/api/import-legacy', { method: 'POST', body: JSON.stringify(data) });\n    }\n};\n```\n\n## Required Changes (specific)\n\n### A. Page Load (`window.onload` callback, around line 1717-1744)\nReplace all localStorage reads at startup:\n```javascript\n// Instead of: const localDB = localStorage.getItem('vcc_pre_master_db_v8');\n// Do:\nAPI.loadSchedules().then(function(apiData) {\n    if (apiData && apiData.length > 0) {\n        masterScheduleDB = apiData;\n    } else {\n        // Fallback to localStorage\n        const localDB = localStorage.getItem('vcc_pre_master_db_v8');\n        if (localDB) {\n            try { masterScheduleDB = JSON.parse(localDB); } catch(e) {}\n            // Also try to import legacy data to server\n            API.importLegacy({ schedules: masterScheduleDB, presets: cuePresets });\n        }\n    }\n});\n// Similar for presets and config\n```\n\n### B. `saveToLocalStorage()` (around line 2127)\nAdd API call after saving to localStorage:\n```javascript\nfunction saveToLocalStorage() {\n    localStorage.setItem('vcc_pre_master_db_v8', JSON.stringify(masterScheduleDB));\n    // Also sync to server (non-blocking)\n    API.saveSchedule(null);  // No, better: just fire all schedules\n    masterScheduleDB.forEach(function(prog) {\n        API.updateSchedule(prog.id, prog);  // upsert\n    });\n    refreshJsonInspectorProbe();\n    markDirty();\n}\n```\nActually, simpler approach — just do a batch save:\n```javascript\nfunction syncAllToServer() {\n    masterScheduleDB.forEach(function(prog) {\n        API.saveSchedule(formatForAPI(prog));  // POST creates/updates\n    });\n}\n```\n\n**Important**: Make the API calls **non-blocking** — fire-and-forget (no await). The app must work even if the server is down. localStorage is always the primary store; server is secondary.\n\n### C. `savePresetAction()` (around line 2019)\nAfter existing localStorage save, add:\n```javascript\nAPI.savePreset({ id: targetId, name: name, nodes: parsedNodes });\n```\n\n### D. `saveConfig()` (around line 1151)\nAfter existing localStorage save, add:\n```javascript\nAPI.saveConfig(appConfig);\n```\n\n### E. `deleteProgram()` + `clearAllPrograms()`\nAfter localStorage operations:\n```javascript\nAPI.deleteSchedule(id);\n```\n\n### F. Backup/Export Buttons\nReplace the download handler to use `/api/backup/download` when available:\n```javascript\nfunction saveDataToFile() {\n    API.downloadBackup().then(function(blob) {\n        if (blob) {\n            const url = URL.createObjectURL(blob);\n            const a = document.createElement('a');\n            a.href = url;\n            a.download = 'VCC_PRE_Backup.json';\n            a.click();\n            URL.revokeObjectURL(url);\n        } else {\n            // Fallback: original localStorage export\n            originalSaveDataToFile();\n        }\n    });\n}\n```\n\n### G. Restore Button\nSimilar pattern: try API first, fallback to localStorage.\n\n### H. Config JSON Panel\nThe existing `refreshConfigJsonArea()` and `applyConfigJson()` should try API first.\n\n## Key Principles\n1. **localStorage is always the source of truth** for data that's been loaded\n2. **Server is secondary** — never block UI on API call\n3. **Fire-and-forget**: all API calls should be non-blocking (use `.then()` not `await`)\n4. **Graceful degradation**: if API fails, app works exactly as before (localStorage only)\n5. **No breaking changes to engine**: CUE calculations, matrix, timeline stay 100% unchanged\n\n## Acceptance Criteria\n- [ ] Page loads API data when server is running\n- [ ] Falls back to localStorage when server is down\n- [ ] Creating/editing/deleting schedules syncs to server (non-blocking)\n- [ ] Creating/editing/deleting presets syncs to server (non-blocking)\n- [ ] Config changes sync to server (non-blocking)\n- [ ] Backup/restore works via API when server is up\n- [ ] App works perfectly even with server offline (pure localStorage mode)\n- [ ] No console errors or infinite loading spinners\n- [ ] All existing features (CUE engine, matrix, timeline, sounds) continue working\n"
