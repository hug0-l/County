- id: CL-1
  title: Clipper IM 聊天分頁
  column: done
  priority: P1
  depends_on:
  - FE-2
  instructions: "## Goal\nAdd a new \"Clipper IM\" tab to the sidebar that connects to the Clipper WebSocket signaling server (ws://localhost:8765) for real-time instant messaging. Default display name: VPRE.\n\n## Files\n- `templates/index.html` (modify)\n\n## Requirements\n\n### 1. Sidebar Menu Entry\nAdd a new menu item after `menu-settings` (before changelog):\n```html\n<div class=\"menu-item\" id=\"menu-clipper\" onclick=\"switchPage('clipper')\">💬 Clipper IM</div>\n```\n\n### 2. New Page: page-clipper\nAdd a new page div after `page-settings`:\n```html\n<div id=\"page-clipper\" class=\"page\">\n    <div class=\"panel-box\">\n        <div class=\"panel-header-box\">\n            <div class=\"panel-title\">💬 Clipper IM — 即時通訊</div>\n            <div style=\"font-size:11px; color:#64748b;\">\n                顯示名稱: <span id=\"clipperDisplayName\" style=\"color:#38bdf8; font-weight:bold; cursor:pointer;\" title=\"點擊編輯\">VPRE</span>\n                <span id=\"clipperStatus\" class=\"sync-badge sync-loading\" style=\"margin-left:8px;\">🔴 未連線</span>\n            </div>\n        </div>\n        \n        <!-- 聊天訊息區 -->\n        <div id=\"clipperMessages\" style=\"height:400px; overflow-y:auto; background:#030712; border:1px solid #1f2937; border-radius:6px; padding:12px; margin-bottom:10px; font-size:13px; line-height:1.6;\">\n            <div style=\"color:#4b5563; text-align:center; padding:40px 0;\">⏳ 正在連線至 Clipper 伺服器...</div>\n        </div>\n        \n        <!-- 輸入區 -->\n        <div style=\"display:flex; gap:8px;\">\n            <input type=\"text\" id=\"clipperInput\" placeholder=\"輸入訊息後按 Enter 發送…\" \n                   style=\"flex:1; background:#090d16; border:1px solid #374151; color:#fff; padding:10px 12px; border-radius:4px; font-size:14px; outline:none;\"\n                   onkeydown=\"if(event.key==='Enter') clipperSendMsg()\">\n            <button class=\"btn-start\" id=\"clipperSendBtn\" onclick=\"clipperSendMsg()\" style=\"padding:10px 20px; font-size:13px;\">📤 發送</button>\n            <button class=\"btn-sync\" onclick=\"clipperConnect()\" style=\"padding:10px 16px; font-size:12px;\" title=\"重新連線\">🔄</button>\n        </div>\n        \n        <!-- 連線設定 -->\n        <div style=\"margin-top:10px; display:flex; gap:8px; align-items:center; font-size:11px; color:#64748b;\">\n            <span>伺服器:</span>\n            <input type=\"text\" id=\"clipperServerUrl\" value=\"ws://localhost:8765\" \n                   style=\"width:200px; background:#090d16; border:1px solid #374151; color:#fff; padding:4px 8px; border-radius:3px; font-size:11px;\">\n            <span>配對碼:</span>\n            <input type=\"text\" id=\"clipperRoomCode\" value=\"1234\" \n                   style=\"width:80px; background:#090d16; border:1px solid #374151; color:#fff; padding:4px 8px; border-radius:3px; font-size:11px;\">\n            <button class=\"btn-ctrl btn-export-ui\" onclick=\"clipperConnect()\" style=\"padding:3px 10px; font-size:10px;\">🔗 連線</button>\n        </div>\n    </div>\n</div>\n```\n\n### 3. Clipper WebSocket Client JS\nAdd after the page HTML (near the other JS functions), a complete Clipper IM client:\n\n```javascript\n// ===== Clipper IM Client =====\nlet clipperWs = null;\nlet clipperConnected = false;\n\nfunction clipperConnect() {\n    const url = document.getElementById('clipperServerUrl').value.trim() || 'ws://localhost:8765';\n    const room = document.getElementById('clipperRoomCode').value.trim() || '1234';\n    const displayName = document.getElementById('clipperDisplayName').textContent.trim() || 'VPRE';\n    \n    if (clipperWs) {\n        clipperWs.close();\n        clipperWs = null;\n    }\n    \n    updateClipperStatus('connecting', '🟡 連線中...');\n    appendClipperMsg('system', `正在連線至 ${url} ...`);\n    \n    try {\n        clipperWs = new WebSocket(url);\n        \n        clipperWs.onopen = function() {\n            clipperConnected = true;\n            updateClipperStatus('connected', '🟢 已連線');\n            appendClipperMsg('system', `✅ 已連線至伺服器，正在加入房間 ${room}...`);\n            \n            // Join room\n            clipperWs.send(JSON.stringify({\n                type: 'join',\n                room: room,\n                displayName: displayName\n            }));\n        };\n        \n        clipperWs.onmessage = function(event) {\n            try {\n                const data = JSON.parse(event.data);\n                handleClipperMessage(data);\n            } catch(e) {\n                console.warn('Clipper message parse error:', e);\n            }\n        };\n        \n        clipperWs.onclose = function() {\n            clipperConnected = false;\n            updateClipperStatus('disconnected', '🔴 未連線');\n            appendClipperMsg('system', '⚠️ 與伺服器斷線');\n        };\n        \n        clipperWs.onerror = function() {\n            updateClipperStatus('error', '🔴 連線錯誤');\n            appendClipperMsg('system', '❌ 無法連線至伺服器，請確認 Clipper 信令伺服器已啟動 (python3 signal_server.py)');\n        };\n    } catch(e) {\n        updateClipperStatus('error', '🔴 連線異常');\n        appendClipperMsg('system', '❌ 連線異常: ' + e.message);\n    }\n}\n\nfunction handleClipperMessage(data) {\n    switch (data.type) {\n        case 'joined':\n            appendClipperMsg('system', `✅ 已加入房間 ${data.room || ''}，當前在線: ${data.peerCount || 1} 人`);\n            // Update peer list if available\n            if (data.peers) {\n                const others = data.peers.filter(function(p) { return p.displayName !== document.getElementById('clipperDisplayName').textContent; });\n                if (others.length > 0) {\n                    appendClipperMsg('system', `👥 其他用戶: ${others.map(function(p) { return p.displayName; }).join(', ')}`);\n                }\n            }\n            break;\n            \n        case 'chat':\n            // Chat message from another peer\n            appendClipperMsg('peer', data.text, data.from);\n            break;\n            \n        case 'chat-backup':\n            // Server-relayed chat message (from WS relay)\n            if (data.from && data.from !== document.getElementById('clipperDisplayName').textContent) {\n                appendClipperMsg('peer', data.text, data.from);\n            }\n            break;\n            \n        case 'signal':\n            // WebRTC signaling — ignore for simple IM mode\n            break;\n            \n        case 'peer-joined':\n            appendClipperMsg('system', `👤 ${data.displayName || '某人'} 加入了房間`);\n            break;\n            \n        case 'peer-left':\n            appendClipperMsg('system', `👋 ${data.displayName || '某人'} 離開了房間`);\n            break;\n            \n        case 'register-name':\n            if (data.displayName) {\n                const currentName = document.getElementById('clipperDisplayName').textContent;\n                if (data.displayName !== currentName) {\n                    appendClipperMsg('system', `ℹ️ 名稱「${data.displayName}」已被使用，已自動調整`);\n                }\n            }\n            break;\n            \n        case 'error':\n            appendClipperMsg('system', `⚠️ 伺服器錯誤: ${data.message || data.error || '未知錯誤'}`);\n            break;\n            \n        default:\n            // Unknown message type, ignore\n            break;\n    }\n}\n\nfunction clipperSendMsg() {\n    const input = document.getElementById('clipperInput');\n    const text = input.value.trim();\n    if (!text || !clipperConnected || !clipperWs) return;\n    \n    const displayName = document.getElementById('clipperDisplayName').textContent.trim();\n    \n    // Send via WebSocket relay (reliable, works without WebRTC)\n    const msg = {\n        type: 'chat',\n        text: text,\n        from: displayName,\n        timestamp: new Date().toISOString()\n    };\n    \n    try {\n        clipperWs.send(JSON.stringify(msg));\n        // Also send as chat-backup for server persistence\n        clipperWs.send(JSON.stringify({\n            type: 'chat-backup',\n            room: document.getElementById('clipperRoomCode').value.trim(),\n            text: text,\n            from: displayName,\n            timestamp: msg.timestamp\n        }));\n    } catch(e) {\n        appendClipperMsg('system', '❌ 發送失敗: ' + e.message);\n    }\n    \n    // Show own message immediately\n    appendClipperMsg('self', text, displayName);\n    input.value = '';\n    input.focus();\n}\n\nfunction appendClipperMsg(type, text, from) {\n    const container = document.getElementById('clipperMessages');\n    if (!container) return;\n    \n    const div = document.createElement('div');\n    div.style.marginBottom = '6px';\n    div.style.padding = '4px 8px';\n    div.style.borderRadius = '4px';\n    \n    const now = new Date();\n    const timeStr = now.toLocaleTimeString('zh-HK', {hour12: false});\n    \n    if (type === 'system') {\n        div.style.color = '#64748b';\n        div.style.fontSize = '12px';\n        div.style.textAlign = 'center';\n        div.textContent = `[${timeStr}] ${text}`;\n    } else if (type === 'self') {\n        div.style.color = '#e2e8f0';\n        div.style.backgroundColor = 'rgba(56,189,248,0.08)';\n        div.style.borderLeft = '3px solid #38bdf8';\n        div.style.marginLeft = '20%';\n        div.innerHTML = `<span style=\"font-size:11px; color:#38bdf8; font-weight:bold;\">${from || '我'}</span> <span style=\"font-size:10px; color:#4b5563;\">${timeStr}</span><br>${escapeHtml(text)}`;\n    } else if (type === 'peer') {\n        div.style.color = '#e2e8f0';\n        div.style.backgroundColor = 'rgba(16,185,129,0.06)';\n        div.style.borderLeft = '3px solid #10b981';\n        div.style.marginRight = '20%';\n        div.innerHTML = `<span style=\"font-size:11px; color:#10b981; font-weight:bold;\">${from || '對方'}</span> <span style=\"font-size:10px; color:#4b5563;\">${timeStr}</span><br>${escapeHtml(text)}`;\n    }\n    \n    container.appendChild(div);\n    container.scrollTop = container.scrollHeight;\n}\n\nfunction updateClipperStatus(state, label) {\n    const statusEl = document.getElementById('clipperStatus');\n    if (!statusEl) return;\n    statusEl.textContent = label;\n    statusEl.className = 'sync-badge';\n    if (state === 'connected') statusEl.className += ' sync-success';\n    else if (state === 'connecting') statusEl.className += ' sync-loading';\n    // disconnected and error keep default style\n}\n\nfunction escapeHtml(text) {\n    const div = document.createElement('div');\n    div.textContent = text;\n    return div.innerHTML;\n}\n\n// Edit display name on click\ndocument.addEventListener('click', function(e) {\n    const target = e.target;\n    if (target && target.id === 'clipperDisplayName') {\n        const current = target.textContent;\n        const input = document.createElement('input');\n        input.type = 'text';\n        input.value = current;\n        input.style.cssText = 'background:#090d16; border:1px solid #38bdf8; color:#38bdf8; padding:2px 6px; border-radius:3px; font-size:13px; width:120px;';\n        target.textContent = '';\n        target.appendChild(input);\n        input.focus();\n        input.select();\n        \n        input.addEventListener('blur', function() {\n            const val = input.value.trim() || 'VPRE';\n            target.textContent = val;\n            // Re-register name with server\n            if (clipperWs && clipperConnected) {\n                clipperWs.send(JSON.stringify({\n                    type: 'register-name',\n                    room: document.getElementById('clipperRoomCode').value.trim(),\n                    displayName: val\n                }));\n            }\n        });\n        \n        input.addEventListener('keydown', function(ev) {\n            if (ev.key === 'Enter') { input.blur(); }\n            if (ev.key === 'Escape') { target.textContent = current; }\n        });\n    }\n});\n```\n\n### 4. Auto-connect on page switch\nIn the `switchPage(pageId)` function, add logic to auto-connect when switching to clipper:\n```javascript\nif (pageId === 'clipper') {\n    if (!clipperConnected) {\n        setTimeout(clipperConnect, 500);\n    }\n}\n```\n\n### 5. Integration Notes\n- The Clipper IM client is intentionally lightweight — only text chat, no file transfer or WebRTC\n- Messages are sent via WebSocket relay (WS mode), which works without WebRTC data channels\n- The default server is `ws://localhost:8765` — same as the Clipper signal_server.py default\n- Users can edit both server URL and room code in the settings bar below the chat\n- Display name persists in localStorage as `vcc_clipper_name`\n\n### 6. Persist display name\n```javascript\n// After editing display name:\nconst savedName = document.getElementById('clipperDisplayName').textContent;\nlocalStorage.setItem('vcc_clipper_name', savedName);\n\n// On page load:\nconst savedClipperName = localStorage.getItem('vcc_clipper_name') || 'VPRE';\ndocument.getElementById('clipperDisplayName').textContent = savedClipperName;\n```\n\n## Acceptance Criteria\n- [ ] Sidebar has \"💬 Clipper IM\" menu item\n- [ ] Clicking Clipper IM shows the chat page\n- [ ] Auto-connects to ws://localhost:8765 with room code 1234\n- [ ] Display name shows \"VPRE\" by default, clickable to edit\n- [ ] Send message → appears in chat box\n- [ ] Receive message from another peer → appears with green left border\n- [ ] Status indicator shows 🟢 已連線 / 🔴 未連線 / 🟡 連線中\n- [ ] Server URL and room code are editable in the settings bar\n- [ ] Disconnect/reconnect works with the 🔄 button\n- [ ] No interference with existing VPre CRUD/engine/settings features\n"
